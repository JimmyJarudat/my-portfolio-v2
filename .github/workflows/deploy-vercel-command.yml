name: Deploy Vercel Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  merge-dev-to-main:
    name: Merge dev to main
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'deploy vercel') &&
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest

    steps:
      - name: Read pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.issue.number;

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            if (pull.base.ref !== 'main') {
              core.setFailed(`This command only works for pull requests targeting main. Current base: ${pull.base.ref}`);
              return;
            }

            if (pull.head.ref !== 'dev') {
              core.setFailed(`This command only works for pull requests from dev. Current head: ${pull.head.ref}`);
              return;
            }

            if (pull.head.repo.full_name !== `${owner}/${repo}`) {
              core.setFailed('The dev branch must be in this repository, not a fork.');
              return;
            }

            core.setOutput('number', pull.number);
            core.setOutput('head_sha', pull.head.sha);
            core.setOutput('head_ref', pull.head.ref);

      - name: React to command
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Approve pull request
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number('${{ steps.pr.outputs.number }}'),
              event: 'APPROVE',
              body: 'Approved by the deploy vercel workflow after a successful build.',
            });

      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = Number('${{ steps.pr.outputs.number }}');
            const sha = '${{ steps.pr.outputs.head_sha }}';

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              commit_title: `Deploy Vercel: merge PR #${pull_number}`,
              merge_method: 'squash',
              sha,
            });

      - name: Recreate dev branch from main
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            await github.rest.git.deleteRef({ owner, repo, ref: 'heads/dev' });

            const { data: main } = await github.rest.repos.getBranch({ owner, repo, branch: 'main' });

            await github.rest.git.createRef({
              owner,
              repo,
              ref: 'refs/heads/dev',
              sha: main.commit.sha,
            });

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.number }}'),
              body: 'Merged `dev` into `main` and deleted the `dev` branch. Vercel can deploy from `main` now.',
            });

name: Deploy Vercel Command

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy dev to main
    if: contains(github.event.head_commit.message, 'deploy vercel')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Merge dev into main
        id: merge
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git checkout main
          BEFORE=$(git rev-parse HEAD)
          CLEAN_MSG=$(echo "${COMMIT_MSG}" | sed 's/deploy vercel//gi' | xargs)
          git merge origin/dev --no-ff -X theirs -m "chore: deploy — ${CLEAN_MSG}"
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "nothing to merge"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git push origin main
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Recreate dev from main
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          git push origin --delete dev
          git branch -D dev
          git checkout -b dev
          git push origin dev
